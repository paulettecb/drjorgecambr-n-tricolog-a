<!DOCTYPE html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Sitio oficial del Dr. Jorge Cambrón Barrales en proceso de actualización."
    />
    <title>Sitio en construcción | Dr. Jorge Cambrón Barrales</title>
    <link rel="icon" type="image/png" href="logodr.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #08101f;
        --text: #f7fbff;
        --muted: #bcc9de;
        --accent: #38d2ff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Inter', system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(42rem 28rem at 84% 7%, rgb(35 63 103 / 35%), transparent 62%),
          radial-gradient(30rem 22rem at 10% 100%, rgb(39 78 129 / 24%), transparent 66%),
          linear-gradient(170deg, #070d1a 0%, #091226 48%, #0b162c 100%);
        padding: 1.25rem;
      }

      .card {
        width: min(720px, 100%);
        text-align: center;
        padding: clamp(1.5rem, 4vw, 2.5rem);
        border-radius: 20px;
        border: 1px solid rgb(210 231 255 / 20%);
        background: linear-gradient(145deg, rgb(11 24 45 / 82%), rgb(7 16 31 / 88%));
        box-shadow: 0 22px 45px rgb(0 0 0 / 42%);
      }

      img {
        width: min(180px, 45vw);
        height: auto;
      }

      h1 {
        margin: 1rem 0 0.6rem;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
      }

      p {
        margin: 0.35rem 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .accent {
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card" aria-labelledby="titulo">
      <img src="logodr.png" alt="Logo Dr. Jorge Cambrón" width="190" height="54" />
      <h1 id="titulo">Sitio en construcción</h1>
      <p class="accent">Dr. Jorge Cambrón Barrales · Tricología e Injerto Capilar</p>
      <p>
        Estamos preparando una nueva experiencia para mostrar servicios médicos,
        resultados y vías de contacto.
      </p>
      <p>Gracias por tu paciencia.</p>
    </main>
  </body>
</html>
